<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cut The Rope Custom V11</title>

<style>

body{
 margin:0;
 padding:20px;
 background:#f5e2bf;
 font-family:Arial;
 text-align:center;
}

h1,h2{
 color:#3a2b1a;
}

.box{
 width:340px;
 margin:25px auto;
 background:#c28d5d;
 border-radius:25px;
 padding:18px;
 position:relative;
 box-shadow:0 5px 15px rgba(0,0,0,.25);
 animation:appear .35s ease;
}

@keyframes appear{
 from{
  opacity:0;
  transform:translateY(15px);
 }
 to{
  opacity:1;
  transform:translateY(0);
 }
}

.boxTitle{
 font-size:28px;
 font-weight:bold;
 color:white;
 cursor:pointer;
}

.grid{
 margin-top:15px;
 display:grid;
 grid-template-columns:repeat(5,55px);
 gap:10px;
 justify-content:center;
}

.level{
 width:55px;
 height:55px;
 border:none;
 border-radius:15px;
 background:#3498db;
 color:white;
 font-weight:bold;
 cursor:pointer;
 transition:.15s;
}

.level:hover{
 transform:scale(1.08);
}

.locked{
 background:#777;
}

.lock{
 position:absolute;
 inset:0;
 background:rgba(0,0,0,.6);
 color:white;
 border-radius:25px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:28px;
 font-weight:bold;
}

.hidden{
 display:none;
}

.controls{
 margin-top:40px;
}

.starBtn{
 font-size:28px;
 cursor:pointer;
 margin:6px;
 border:none;
 background:white;
 border-radius:10px;
 padding:10px;
}

#revisionBox{
 margin-top:90px;
}

#codeInput{
 padding:10px;
 border-radius:10px;
 border:none;
 margin-top:10px;
}

@media(max-width:600px){

 .box{
  width:95%;
 }

 .grid{
  grid-template-columns:repeat(4,55px);
 }

}

</style>
</head>

<body>

<h1>🍬 Cut The Rope Custom</h1>

<button onclick="playMusic()">🎵 Música</button>
<button onclick="showCode()">🔓 Código</button>

<br><br>

<input
id="codeInput"
class="hidden"
placeholder="Escreve o código..."
onkeydown="applyCode(event)"
>

<h2>🌟 Temporada 1</h2>

<div class="box">
<div class="boxTitle" onclick="toggleBox('b1')">
📦 Caixa Inicial
</div>
<div class="grid" id="b1"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openBox('b2',35)">
✨ Magia
</div>
<div class="lock" id="lock2">35 ⭐</div>
<div class="grid hidden" id="b2"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openBox('b3',70)">
⚠️ Perigos
</div>
<div class="lock" id="lock3">70 ⭐</div>
<div class="grid hidden" id="b3"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openBox('b4',100)">
🌌 Distância
</div>
<div class="lock" id="lock4">100 ⭐</div>
<div class="grid hidden" id="b4"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openBox('b5',130)">
☠️ Zona de Risco
</div>
<div class="lock" id="lock5">130 ⭐</div>
<div class="grid hidden" id="b5"></div>
</div>

<h2 id="season2Title">🔒 Temporada 2</h2>

<div class="box">
<div class="boxTitle" onclick="openGhostBox()">
👻 Fase Fantasma
</div>
<div class="lock" id="lock6">180 ⭐</div>
<div class="grid hidden" id="b6"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openSeason2('b7',40)">
🏮 Lanternas
</div>
<div class="lock" id="lock7">40 ⭐</div>
<div class="grid hidden" id="b7"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openSeason2('b8',70)">
🐭 Ratos
</div>
<div class="lock" id="lock8">70 ⭐</div>
<div class="grid hidden" id="b8"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openSeason2('b9',100)">
💡 Noite
</div>
<div class="lock" id="lock9">100 ⭐</div>
<div class="grid hidden" id="b9"></div>
</div>

<div class="box">
<div class="boxTitle" onclick="openSeason2('b10',130)">
⚙️ Mecânica
</div>
<div class="lock" id="lock10">130 ⭐</div>
<div class="grid hidden" id="b10"></div>
</div>

<div class="box" id="revisionBox">
<div class="boxTitle" onclick="toggleBox('b11')">
🛠️ Caixa Revisões
</div>
<div class="grid hidden" id="b11"></div>
</div>

<div class="controls">

<h3>⭐ Botões de estrelas</h3>

<button class="starBtn" onclick="giveStars(1)">⭐</button>
<button class="starBtn" onclick="giveStars(2)">⭐⭐</button>
<button class="starBtn" onclick="giveStars(3)">⭐⭐⭐</button>

<br><br>

<button onclick="resetProgress()">🗑️ Reset</button>

</div>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=fun-game-loop-140bpm-8717.mp3">
</audio>

<script>

const boxes = {

1:[
"lTDT","NHXI","ePeK","DzSE","yxRy",
"UxTs","IjFf","mmqQ","tlue","WBjF",
"hniT","QOLQ","SfsN","Rbkz","dKXr"
],

2:[
"rEgN","aVzu","dzxy","bPDj","Aelr",
"Tejh","UgbA","dOkj","MGPv","HAJA"
],

3:[
"vzhJ","crLu","DqOJ","pdWX","SCXl",
"YdIg","Vwsm","ivfp","CsYA","Dcro"
],

4:[
"MjBA","oxMQ","KJXf","azSz","LDSu",
"WUlG","qarR","puVd","OWQI","lQzu"
],

5:[
"LvMb","jfwi","AnPf","uMeP","SztJ",
"fMSX","wlSF","MOpo","uros","IzjJ",
"KMuA","ZWwI","SaLm","bWXO","jzCD"
],

6:[
"AtWJ","ykvr","WNHq","wPBg","bzXb",
"hoSu","DXIi","eFUq","QLJo","wlBP",
"nZvA","dpMi","yTjv","izUV","InJY"
],

7:[
"RIto","iYNG","rqAJ","pNvp","Qpbz",
"BjAH","gbuN","MtHw","nlxn","gRVA"
],

8:[
"YPRM","qsNY","WDtF","AyKP","rBPN",
"FYMV","Wmku","wLQl","AMZK","TvJd"
],

9:[
"qgeC","bbyM","fUcv","foRo","zngG",
"OGhE","HCNj","TTCn","SzqK","sREM"
],

10:[
"ZcMI","heut","ioKZ","ysZQ","cFHv",
"hwVA","CKjf","oWzO","jcXU","kCSC"
]

};

const revisions = [

["lfvw",3],
["GYJz",9],
["BSbp",9],
["IyYA",15],
["CBzO",15],
["vcVp",18],
["TsTk",21],
["zNMr",21],
["klMI",33],
["cghk",33],
["uCyi",33],
["OIxT",48],
["xotj",66],
["InGz",78],
["VHJm",78],
["xcfp",78],
["fIgP",78],
["Bxhw",78],
["TuKG",78],
["cKOK",87],
["eVog",96],
["VESv",108],
["Ufxb",108],
["VHwC",108],
["AAUs",123],
["rpsn",123],
["KFzp",138],
["rUsM",138],
["tCTP",150],
["XWMj",180]

];

let stars =
JSON.parse(localStorage.getItem("stars")) || {};

let unlocked =
parseInt(localStorage.getItem("unlocked")) || 1;

let currentLevel =
parseInt(localStorage.getItem("currentLevel")) || 1;

function totalStars(){

 let t=0;

 for(let k in stars){
  t+=stars[k];
 }

 return t;
}

function save(){

 localStorage.setItem(
  "stars",
  JSON.stringify(stars)
 );

 localStorage.setItem(
  "unlocked",
  unlocked
 );

 localStorage.setItem(
  "currentLevel",
  currentLevel
 );
}

function toggleBox(id){

 document
 .getElementById(id)
 .classList.toggle("hidden");
}

function playMusic(){

 let music =
 document.getElementById("bgm");

 music.play()
 .catch(()=>{

  alert(
   "Clica novamente no botão da música."
  );

 });

}

function showCode(){

 document
 .getElementById("codeInput")
 .classList.toggle("hidden");
}

function applyCode(e){

 if(
  e.key==="Enter" &&
  e.target.value==="Zeptolab"
 ){

  unlocked=999;

  for(let i=1;i<=500;i++){
   stars[i]=3;
  }

  save();

  location.reload();
 }

}

function openBox(id,need){

 if(totalStars()>=need){

  toggleBox(id);

 }

}

function openGhostBox(){

 if(totalStars()>=180){

  toggleBox("b6");

  document
  .getElementById("season2Title")
  .innerHTML=
  "🌟 Temporada 2";

 }

}

function openSeason2(id,need){

 let s2 =
 Math.max(0,totalStars()-180);

 if(s2>=need){

  toggleBox(id);

 }

}

function updateLocks(){

 const season1 = {
  2:35,
  3:70,
  4:100,
  5:130
 };

 for(let k in season1){

  if(
   totalStars()>=season1[k]
  ){

   document
   .getElementById("lock"+k)
   .style.display="none";

  }

 }

 if(totalStars()>=180){

  document
  .getElementById("lock6")
  .style.display="none";

  document
  .getElementById("season2Title")
  .innerHTML=
  "🌟 Temporada 2";

 }

 const season2 = {
  7:40,
  8:70,
  9:100,
  10:130
 };

 let s2 =
 Math.max(0,totalStars()-180);

 for(let k in season2){

  if(s2>=season2[k]){

   document
   .getElementById("lock"+k)
   .style.display="none";

  }

 }

}

function giveStars(n){

 stars[currentLevel]=n;

 if(currentLevel===unlocked){
  unlocked++;
 }

 save();

 location.reload();
}

function resetProgress(){

 localStorage.clear();

 location.reload();
}

function createLevels(){

 let global=1;

 for(let b=1;b<=10;b++){

  let div =
  document.getElementById("b"+b);

  boxes[b].forEach((lvl,i)=>{

   let levelNumber = global;

   let btn =
   document.createElement("button");

   btn.className="level";

   if(levelNumber>unlocked){

    btn.classList.add(
     "locked"
    );

   }

   let st =
   stars[levelNumber]
   ? "⭐".repeat(stars[levelNumber])
   : "";

   btn.innerHTML =
   (i+1)+"<br>"+st;

   btn.onclick = function(){

    if(levelNumber>unlocked){
     return;
    }

    currentLevel =
    levelNumber;

    save();

    window.open(
     "https://play.candies.monster/"+lvl,
     "_blank"
    );

   };

   div.appendChild(btn);

   global++;

  });

 }

}

function createRevisionLevels(){

 let div =
 document.getElementById("b11");

 revisions.forEach((lvl,i)=>{

  let btn =
  document.createElement("button");

  btn.className="level";

  let needed =
  lvl[1];

  if(totalStars()<needed){

   btn.classList.add(
    "locked"
   );

  }

  btn.innerHTML =
  "R"+(i+1)+"<br>"+needed+"⭐";

  btn.onclick = function(){

   if(totalStars()<needed){
    return;
   }

   window.open(
    "https://play.candies.monster/"+lvl[0],
    "_blank"
   );

  };

  div.appendChild(btn);

 });

}

createLevels();
createRevisionLevels();
updateLocks();

</script>

</body>
</html>
