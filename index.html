<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cut the Rope 9.1</title>
<style>
body{font-family:Arial;text-align:center;background:#f2e0c9;margin:0}
.box{margin:18px auto;padding:14px;border-radius:16px;width:320px;background:#d9b38c;cursor:pointer;position:relative;transition:all .25s ease;box-shadow:0 4px 10px rgba(0,0,0,.15)}
.box:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 18px rgba(0,0,0,.25)}
.grid{display:grid;grid-template-columns:repeat(5,60px);gap:8px;justify-content:center}
button{padding:8px;border:none;border-radius:10px;cursor:pointer;transition:all .18s ease}
button:hover{transform:scale(1.08)}
.unlocked{background:#3498db;color:#fff}
.locked{background:#7f8c8d}
.hidden{display:none}
.lockOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);color:#fff;display:flex;align-items:center;justify-content:center;border-radius:16px;font-weight:bold}
.starBtns{margin:20px auto;background:#fff;padding:10px;border-radius:12px;width:240px}
</style>
</head>
<body>
<h1>🍬 Cut the Rope 9.1</h1>

<button onclick="startMusic()">🎵 Música</button>
<button onclick="showCode()">🔓 Código</button>
<input id="code" placeholder="Escreve código" style="display:none" onkeydown="applyCode(event)">

<audio id="music" loop></audio>

<h2>🌟 Temporada 1</h2>
<div class="box" onclick="toggle('s1')"><h3>📦 Caixa Inicial</h3><div id="l1"></div><div id="s1" class="grid hidden"></div></div>
<div class="box" onclick="openBox(2)"><h3>✨ Magia</h3><div id="l2" class="lockOverlay"></div><div id="s2" class="grid hidden"></div></div>
<div class="box" onclick="openBox(3)"><h3>⚠️ Perigos</h3><div id="l3" class="lockOverlay"></div><div id="s3" class="grid hidden"></div></div>
<div class="box" onclick="openBox(4)"><h3>🌌 Distância</h3><div id="l4" class="lockOverlay"></div><div id="s4" class="grid hidden"></div></div>
<div class="box" onclick="openBox(5)"><h3>☠️ Zona de Risco</h3><div id="l5" class="lockOverlay"></div><div id="s5" class="grid hidden"></div></div>

<h2 id="season2Title">🔒 Temporada 2</h2>
<div id="season2">
<div class="box" onclick="openBox(6)"><h3>🎧 Fase Fantasma</h3><div id="l6" class="lockOverlay"></div><div id="s6" class="grid hidden"></div></div>
<div class="box" onclick="openBox(7)"><h3>🏮 Lanternas</h3><div id="l7" class="lockOverlay"></div><div id="s7" class="grid hidden"></div></div>
<div class="box" onclick="openBox(8)"><h3>🐭 Ratos</h3><div id="l8" class="lockOverlay"></div><div id="s8" class="grid hidden"></div></div>
<div class="box" onclick="openBox(9)"><h3>💡 Noite</h3><div id="l9" class="lockOverlay"></div><div id="s9" class="grid hidden"></div></div>
<div class="box" onclick="openBox(10)"><h3>⚙️ Mecânica</h3><div id="l10" class="lockOverlay"></div><div id="s10" class="grid hidden"></div></div>

<div class="box" onclick="openRevisions()"><h3>🛠️ Caixa de Revisões (WIP)</h3><div id="l11" class="lockOverlay">WIP<br>Espera pela próxima versão<br>ou desbloqueia com o código</div><div id="s11" class="grid hidden"></div></div>
</div>

<button onclick="resetProgress()">🗑️ Reset</button>

<div class="starBtns">
<button onclick="finish(1)">⭐</button>
<button onclick="finish(2)">⭐⭐</button>
<button onclick="finish(3)">⭐⭐⭐</button>
</div>

<script>
const boxes=[
["lTDT","NHXI","ePeK","DzSE","yxRy","UxTs","IjFf","mmqQ","tlue","WBjF","hniT","QOLQ","SfsN","Rbkz","dKXr"],
["rEgN","aVzu","dzxy","bPDj","Aelr","Tejh","UgbA","dOkj","MGPv","HAJA"],
["vzhJ","crLu","DqOJ","pdWX","SCXl","YdIg","Vwsm","ivfp","CsYA","Dcro"],
["MjBA","oxMQ","KJXf","azSz","LDSu","WUlG","qarR","puVd","OWQI","lQzu"],
["LvMb","jfwi","AnPf","uMeP","SztJ","fMSX","wlSF","MOpo","uros","IzjJ","KMuA","ZWwI","SaLm","bWXO","jzCD"],
["AtWJ","ykvr","WNHq","wPBg","bzXb","hoSu","DXIi","eFUq","QLJo","wlBP","nZvA","dpMi","yTjv","izUV","InJY"],
["RIto","iYNG","rqAJ","pNvp","Qpbz","BjAH","gbuN","MtHw","nlxn","gRVA"],
["YPRM","qsNY","WDtF","AyKP","rBPN","FYMV","Wmku","wLQl","AMZK","TvJd"],
["qgeC","bbyM","fUcv","foRo","zngG","OGhE","HCNj","TTCn","SzqK","sREM"],
["ZcMI","heut","ioKZ","ysZQ","cFHv","hwVA","CKjf","oWzO","jcXU","kCSC"],
["lfvw","GYJz","BSbp","IyYA","CBzO","TsTk","InGz","VHJm","vcVp","zNMr","klMI","cghk","uCyi","OIxT","tCTP","xotj","xcfp","fIgP","Bxhw","TuKG","VESv","Ufxb","cKOK","VHwC","AAUs","rpsn","KFzp","eVog","rUsM","XWMj"]
];

// REGRAS DE ESTRELAS
const season1Needs=[0,35,70,100,130];
const season2Unlock=135;
const season2Needs=[0,40,70,100,130];

let progress=parseInt(localStorage.getItem("p"))||1;
let stars=JSON.parse(localStorage.getItem("s"))||{};

function totalStars(){let t=0;for(let k in stars)t+=stars[k];return t}
function season2Stars(){return Math.max(0,totalStars()-season2Unlock)}
function toggle(id){document.getElementById(id).classList.toggle("hidden")}

function canOpenBox(n){
 if(n==1) return true;
 if(n<=5){ return totalStars()>=season1Needs[n-1]; }
 if(n==6){ return totalStars()>=season2Unlock; }
 if(n>6){ return season2Stars()>=season2Needs[n-6]; }
}

function openRevisions(){
 if(localStorage.getItem("revUnlocked")!=="yes") return;
 toggle('s11');
}

function openBox(n){
 if(!canOpenBox(n)) return;
 toggle('s'+n);
}

function updateLocks(){
 for(let i=1;i<=10;i++){
  let el=document.getElementById('l'+i);
  if(i==1){el.style.display="none";continue;}

  let need=0,have=0;
  if(i<=5){ need=season1Needs[i-1]; have=totalStars(); }
  else if(i==6){ need=season2Unlock; have=totalStars(); }
  else{ need=season2Needs[i-6]; have=season2Stars(); }

  let diff=need-have;
  if(diff>0){ el.style.display="flex"; el.innerText=diff+" ⭐"; }
  else el.style.display="none";
 }

 if(totalStars()>=season2Unlock){
  document.getElementById("season2Title").innerText="🌟 Temporada 2";
 }
}

function build(){
 let level=1;
 boxes.forEach((b,i)=>{
  let div=document.getElementById('s'+(i+1));
  div.innerHTML="";
  b.forEach((code,j)=>{
    let btn=document.createElement("button");
    let starsTxt=stars[level]?"⭐".repeat(stars[level]):"";
    btn.innerHTML=(j+1)+"<br>"+starsTxt;
    if(level<=progress){
      btn.className="unlocked";
      btn.onclick=()=>{
        localStorage.setItem("c",level);
        window.open("https://play.candies.monster/"+code,'_blank');
      }
    } else btn.className="locked";
    div.appendChild(btn);
    level++;
  });
 });
}

function finish(n){
 let lvl=parseInt(localStorage.getItem("c"));
 if(!lvl)return;
 stars[lvl]=Math.max(stars[lvl]||0,n);
 if(lvl>=progress) progress=lvl+1;
 localStorage.setItem("p",progress);
 localStorage.setItem("s",JSON.stringify(stars));
 location.reload();
}

function startMusic(){
 let m=document.getElementById("music");
 if(!m.src){
  m.src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_game_loop.mp3";
  m.load();
 }
 m.play().catch(()=>alert("Clica outra vez"));
}

function showCode(){document.getElementById("code").style.display="inline"}

function applyCode(e){
 if(e.key==="Enter" && e.target.value==="Zeptolab"){
  let total=0; boxes.forEach(b=> total+=b.length);
  for(let i=1;i<=total+30;i++){stars[i]=3;}
  localStorage.setItem("revUnlocked","yes");
  progress=999;
  localStorage.setItem("p",progress);
  localStorage.setItem("s",JSON.stringify(stars));
  location.reload();
 }
}

function resetProgress(){
 localStorage.clear();
 location.reload();
}

build();
updateLocks();
</script>
</body>
</html>
