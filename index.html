<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cut The Rope Custom</title>

<style>

body{
 background:#f4e3c3;
 font-family:Arial;
 text-align:center;
 margin:0;
 padding:20px;
}

h1,h2{
 color:#3b2a1a;
}

.box{
 background:#c79b6b;
 width:340px;
 margin:20px auto;
 border-radius:20px;
 padding:15px;
 position:relative;
 box-shadow:0 5px 12px rgba(0,0,0,.2);
 transition:.2s;
}

.box:hover{
 transform:scale(1.02);
}

.lock{
 position:absolute;
 inset:0;
 background:rgba(0,0,0,.6);
 color:white;
 border-radius:20px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:22px;
 font-weight:bold;
}

.grid{
 display:grid;
 grid-template-columns:repeat(5,55px);
 gap:8px;
 justify-content:center;
 margin-top:10px;
}

.level{
 height:55px;
 border:none;
 border-radius:12px;
 background:#3498db;
 color:white;
 font-weight:bold;
 cursor:pointer;
}

.level:hover{
 transform:scale(1.05);
}

.lockedLevel{
 background:#777;
}

.hidden{
 display:none;
}

#revisionBox{
 margin-top:80px;
}

.controls{
 margin-top:30px;
}

.starBtn{
 font-size:22px;
 margin:5px;
 cursor:pointer;
}

#codeInput{
 margin-top:10px;
 padding:8px;
 border-radius:8px;
 border:none;
}

</style>
</head>

<body>

<h1>🍬 Cut The Rope Custom</h1>

<button onclick="music()">🎵 Música</button>
<button onclick="showCode()">🔓 Código</button>

<div>
<input
 id="codeInput"
 class="hidden"
 placeholder="Código..."
 onkeydown="code(event)"
>
</div>

<h2>🌟 Temporada 1</h2>

<div class="box">
<h3 onclick="toggle('b1')">📦 Caixa Inicial</h3>
<div id="b1" class="grid"></div>
</div>

<div class="box">
<h3 onclick="openSeason1(2,'b2')">✨ Magia</h3>
<div id="lock2" class="lock">35 ⭐</div>
<div id="b2" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason1(3,'b3')">⚠️ Perigos</h3>
<div id="lock3" class="lock">70 ⭐</div>
<div id="b3" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason1(4,'b4')">🌌 Distância</h3>
<div id="lock4" class="lock">100 ⭐</div>
<div id="b4" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason1(5,'b5')">☠️ Zona de Risco</h3>
<div id="lock5" class="lock">130 ⭐</div>
<div id="b5" class="grid hidden"></div>
</div>

<h2 id="s2title">🔒 Temporada 2</h2>

<div class="box">
<h3 onclick="openSeason2(6,'b6')">👻 Fase Fantasma</h3>
<div id="lock6" class="lock">180 ⭐</div>
<div id="b6" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason2Extra(7,'b7',40)">🏮 Lanternas</h3>
<div id="lock7" class="lock">40 ⭐</div>
<div id="b7" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason2Extra(8,'b8',70)">🐭 Ratos</h3>
<div id="lock8" class="lock">70 ⭐</div>
<div id="b8" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason2Extra(9,'b9',100)">💡 Noite</h3>
<div id="lock9" class="lock">100 ⭐</div>
<div id="b9" class="grid hidden"></div>
</div>

<div class="box">
<h3 onclick="openSeason2Extra(10,'b10',130)">⚙️ Mecânica</h3>
<div id="lock10" class="lock">130 ⭐</div>
<div id="b10" class="grid hidden"></div>
</div>

<div id="revisionBox" class="box">
<h3 onclick="toggle('b11')">🛠️ Caixa Revisões</h3>
<div id="b11" class="grid hidden"></div>
</div>

<div class="controls">

<h3>⭐ Dar estrelas</h3>

<button class="starBtn" onclick="giveStars(1)">⭐</button>
<button class="starBtn" onclick="giveStars(2)">⭐⭐</button>
<button class="starBtn" onclick="giveStars(3)">⭐⭐⭐</button>

<br><br>

<button onclick="reset()">🗑️ Reset</button>

</div>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=fun-game-loop-140bpm-8717.mp3">
</audio>

<script>

const boxes = {

1:[
"lTDT","NHXI","ePeK","DzSE","yxRy",
"UxTs","IjFf","mmqQ","tlue","WBjF",
"hniT","QOLQ","SfsN","Rbkz","dKXr"
],

2:[
"rEgN","aVzu","dzxy","bPDj","Aelr",
"Tejh","UgbA","dOkj","MGPv","HAJA"
],

3:[
"vzhJ","crLu","DqOJ","pdWX","SCXl",
"YdIg","Vwsm","ivfp","CsYA","Dcro"
],

4:[
"MjBA","oxMQ","KJXf","azSz","LDSu",
"WUlG","qarR","puVd","OWQI","lQzu"
],

5:[
"LvMb","jfwi","AnPf","uMeP","SztJ",
"fMSX","wlSF","MOpo","uros","IzjJ",
"KMuA","ZWwI","SaLm","bWXO","jzCD"
],

6:[
"AtWJ","ykvr","WNHq","wPBg","bzXb",
"hoSu","DXIi","eFUq","QLJo","wlBP",
"nZvA","dpMi","yTjv","izUV","InJY"
],

7:[
"RIto","iYNG","rqAJ","pNvp","Qpbz",
"BjAH","gbuN","MtHw","nlxn","gRVA"
],

8:[
"YPRM","qsNY","WDtF","AyKP","rBPN",
"FYMV","Wmku","wLQl","AMZK","TvJd"
],

9:[
"qgeC","bbyM","fUcv","foRo","zngG",
"OGhE","HCNj","TTCn","SzqK","sREM"
],

10:[
"ZcMI","heut","ioKZ","ysZQ","cFHv",
"hwVA","CKjf","oWzO","jcXU","kCSC"
]

};

const revisions = [
["lfvw",3],["GYJz",9],["BSbp",9],["IyYA",15],
["CBzO",15],["vcVp",18],["TsTk",21],["zNMr",21],
["klMI",33],["cghk",33],["uCyi",33],["OIxT",48],
["xotj",66],["InGz",78],["VHJm",78],["xcfp",78],
["fIgP",78],["Bxhw",78],["TuKG",78],["cKOK",87],
["eVog",96],["VESv",108],["Ufxb",108],["VHwC",108],
["AAUs",123],["rpsn",123],["KFzp",138],["rUsM",138],
["tCTP",150],["XWMj",180]
];

let stars =
JSON.parse(localStorage.getItem("stars")) || {};

let unlocked =
parseInt(localStorage.getItem("unlock")) || 1;

let current =
parseInt(localStorage.getItem("current")) || 1;

function totalStars(){

 let t=0;

 for(let k in stars){
  t+=stars[k];
 }

 return t;
}

function toggle(id){
 document
 .getElementById(id)
 .classList.toggle("hidden");
}

function music(){

 let a =
 document.getElementById("bgm");

 a.play()
 .catch(()=>alert("Clica outra vez"));
}

function showCode(){

 document
 .getElementById("codeInput")
 .classList.remove("hidden");
}

function code(e){

 if(
  e.key==="Enter" &&
  e.target.value==="Zeptolab"
 ){

  unlocked=999;

  for(let i=1;i<=300;i++){
   stars[i]=3;
  }

  save();
  location.reload();
 }
}

function save(){

 localStorage.setItem(
  "stars",
  JSON.stringify(stars)
 );

 localStorage.setItem(
  "unlock",
  unlocked
 );

 localStorage.setItem(
  "current",
  current
 );
}

function build(){

 let global=1;

 for(let b=1;b<=10;b++){

  let div =
  document.getElementById(
   "b"+b
  );

  boxes[b].forEach((lvl,i)=>{

   let btn =
   document.createElement("button");

   btn.className="level";

   if(global>unlocked){
    btn.classList.add(
     "lockedLevel"
    );
   }

   let st =
   stars[global]
   ? "⭐".repeat(stars[global])
   : "";

   btn.innerHTML=
   (i+1)+"<br>"+st;

   btn.onclick=()=>{

    if(global>unlocked) return;

    current=global;

    save();

    window.open(
     "https://play.candies.monster/"+lvl,
     "_blank"
    );
   };

   div.appendChild(btn);

   global++;

  });

 }

 buildRevisions();
 updateLocks();
}

function buildRevisions(){

 let div =
 document.getElementById("b11");

 revisions.forEach((r,i)=>{

  let btn =
  document.createElement("button");

  btn.className="level";

  if(totalStars()<r[1]){
   btn.classList.add(
    "lockedLevel"
   );
  }

  btn.innerHTML=
  "R-"+(i+1)+"<br>"+r[1]+"⭐";

  btn.onclick=()=>{

   if(totalStars()<r[1]) return;

   window.open(
    "https://play.candies.monster/"+r[0],
    "_blank"
   );
  };

  div.appendChild(btn);
 });
}

function giveStars(n){

 stars[current]=n;

 if(current===unlocked){
  unlocked++;
 }

 save();

 location.reload();
}

function openSeason1(box,id){

 const needs={
  2:35,
  3:70,
  4:100,
  5:130
 };

 if(totalStars()>=needs[box]){
  toggle(id);
 }
}

function openSeason2(box,id){

 if(totalStars()>=180){

  toggle(id);

  document
  .getElementById("s2title")
  .innerHTML=
  "🌟 Temporada 2";
 }
}

function openSeason2Extra(box,id,need){

 let s2 =
 Math.max(
  0,
  totalStars()-180
 );

 if(s2>=need){
  toggle(id);
 }
}

function updateLocks(){

 const s1={
  2:35,
  3:70,
  4:100,
  5:130
 };

 for(let k in s1){

  if(totalStars()>=s1[k]){

   document
   .getElementById(
    "lock"+k
   )
   .style.display="none";
  }
 }

 if(totalStars()>=180){

  document
  .getElementById(
   "lock6"
  )
  .style.display="none";

  document
  .getElementById(
   "s2title"
  )
  .innerHTML=
  "🌟 Temporada 2";
 }

 let s2 =
 Math.max(
  0,
  totalStars()-180
 );

 const s2locks={
  7:40,
  8:70,
  9:100,
  10:130
 };

 for(let k in s2locks){

  if(s2>=s2locks[k]){

   document
   .getElementById(
    "lock"+k
   )
   .style.display="none";
  }
 }

}

function reset(){

 localStorage.clear();

 location.reload();
}

build();

</script>

</body>
</html>
